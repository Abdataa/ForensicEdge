# alembic.ini
# Alembic configuration for ForensicEdge PostgreSQL migrations.
# Place this file in: backend/alembic.ini
#
# Run from the backend/ directory:
#   alembic revision --autogenerate -m "description"
#   alembic upgrade head
#   alembic downgrade -1
#   alembic history

[alembic]
# Path to migration scripts (relative to this file)
script_location = ../database/migrations

# sqlalchemy.url is set dynamically in env.py from settings.DATABASE_URL_SYNC
# Leave this blank — env.py overrides it
sqlalchemy.url =

# Timezone for revision timestamps
timezone = UTC

# Template for new migration filenames
# %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s.py
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s


[post_write_hooks]
# Optional: run black formatter on new migration files
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 88


[loggers]
keys = root, sqlalchemy, alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level    = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level    = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level    = INFO
handlers =
qualname = alembic

[handler_console]
class     = StreamHandler
args      = (sys.stderr,)
level     = NOTSET
formatter = generic

[formatter_generic]
format    = %(levelname)-5.5s [%(name)s] %(message)s
datefmt   = %H:%M:%S

